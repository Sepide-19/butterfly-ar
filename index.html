<!DOCTYPE html>
<html lang="fa">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Butterfly WebAR</title>

  <script src="https://aframe.io/releases/1.6.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/aframe-extras@7.0.0/dist/aframe-extras.min.js"></script>
  <script src="https://raw.githack.com/AR-js-org/AR.js/3.4.8/aframe/build/aframe-ar.js"></script>

  <script>
    AFRAME.registerComponent('float-around', {
      schema: {
        amplitudeX: { default: 0.08 },
        amplitudeY: { default: 0.025 },
        speed: { default: 0.9 },
        baseX: { default: 0 },
        baseY: { default: 0.18 },
        baseZ: { default: 0 }
      },
      tick: function (time) {
        const t = time / 1000;
        const x = this.data.baseX + Math.sin(t * this.data.speed) * this.data.amplitudeX;
        const y = this.data.baseY + Math.cos(t * this.data.speed * 1.2) * this.data.amplitudeY;
        this.el.object3D.position.set(x, y, this.data.baseZ);
      }
    });
  </script>

  <style>
    body {
      margin: 0;
      overflow: hidden;
      font-family: Georgia, serif;
    }

    .overlay-text {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      width: min(90vw, 760px);
      background: rgba(255, 255, 255, 0.92);
      color: #222;
      padding: 14px 18px;
      border-radius: 12px;
      text-align: center;
      line-height: 1.7;
      font-size: 16px;
      z-index: 10;
      box-shadow: 0 6px 20px rgba(0, 0, 0, 0.18);
    }

    .overlay-text h2 {
      margin: 0 0 8px 0;
      font-size: 20px;
    }
  </style>
</head>

<body>
  <div class="overlay-text">
    <h2>Butterfly</h2>
    Butterflies are delicate insects known for their vivid wings and remarkable
    life cycle. They undergo complete metamorphosis, changing from egg to
    caterpillar, then chrysalis, and finally emerging as winged adults.
  </div>

  <a-scene
    embedded
    vr-mode-ui="enabled: false"
    renderer="logarithmicDepthBuffer: true; colorManagement: true;"
    arjs="trackingMethod: best; sourceType: webcam; debugUIEnabled: false;"
  >
    <a-assets>
      <a-asset-item id="butterflyModel" src="animated_butterfly.glb"></a-asset-item>
    </a-assets>

    <a-marker type="pattern" url="pattern-marker.patt">
      <a-entity
        gltf-model="#butterflyModel"
        animation-mixer
        float-around="amplitudeX: 0.08; amplitudeY: 0.025; speed: 0.9; baseX: 0; baseY: 0.18; baseZ: 0"
        scale="0.18 0.18 0.18"
        rotation="0 180 0">
      </a-entity>

      <a-text
        value="Butterfly"
        position="0 0.55 0"
        align="center"
        color="#ffffff"
        width="2.2">
      </a-text>
    </a-marker>

    <a-entity camera></a-entity>
  </a-scene>
</body>
</html>
